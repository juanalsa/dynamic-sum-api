server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dynamicsum
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
  cache:
    type: simple

logging:
  level:
    root: INFO

